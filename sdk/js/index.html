<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Orbit Test Client</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #111; color: #fff; padding: 2rem; }
        .log { background: #222; padding: 1rem; border-radius: 8px; height: 300px; overflow-y: auto; font-family: monospace; }
        input, button { padding: 0.5rem; margin-right: 0.5rem; border: none; border-radius: 4px; }
        input { width: 300px; }
        button { cursor: pointer; background: #007bff; color: white; }
    </style>
</head>
<body>

    <h1>Orbit Realtime DB</h1>
    
    <div style="margin-bottom: 1rem;">
        <input type="text" id="payload" placeholder="Type a message..." />
        <button onclick="publish()">Publish to room-1</button>
    </div>

    <div class="log" id="log"></div>

    <script type="module">
        import { Orbit } from './orbit.js';

        const token = Math.random().toString(36).substring(7); // fake random user
        const orbit = new Orbit(`ws://localhost:8080/ws?token=${token}`);

        const logDiv = document.getElementById('log');
        function print(msg) {
            logDiv.innerHTML += `<div>${msg}</div>`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        orbit.onConnected(() => {
            print(`<span style="color: #4cd137">Connected as User-${token}</span>`);
        });

        orbit.subscribe('room-1', (msg) => {
            print(`<strong style="color: #00a8ff">[room-1]</strong> User-${msg.payload.user}: ${msg.payload.text}`);
        });

        window.publish = function() {
            const input = document.getElementById('payload');
            if(!input.value) return;

            orbit.publish('room-1', {
                user: token,
                text: input.value
            });
            input.value = '';
        }
    </script>
</body>
</html>
